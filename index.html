<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Balon Patlat! - Idle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Lilita+One&display=swap');

:root {
  --bg: #3a2820;
  --bg-dark: #2a1a14;
  --panel-bg: rgba(0,0,0,0.6);
  --gold: #ffd700;
  --green: #4caf50;
  --red: #ff3366;
  --blue: #40c4ff;
  --purple: #bb86fc;
  --text: #fff;
  --text-dim: #aaa;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Fredoka', sans-serif;
  background: radial-gradient(ellipse at 50% 40%, #5a3a2a, #2a1a10);
  color: var(--text);
  overflow: hidden;
  height: 100vh; width: 100vw;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  cursor: default;
}

/* ═══ LAYOUT ═══ */
#game {
  width: 100%; height: 100%;
  position: relative;
}

/* ═══ TOP-LEFT: Resources ═══ */
#res-panel {
  position: absolute;
  top: 12px; left: 12px;
  background: var(--panel-bg);
  border-radius: 12px;
  padding: 10px 14px;
  z-index: 20;
  min-width: 150px;
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.1);
}

#res-panel .res-title {
  font-family: 'Lilita One', cursive;
  font-size: 13px; color: var(--gold);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.res-row {
  display: flex; align-items: center; gap: 8px;
  padding: 3px 0;
  font-size: 13px;
}
.res-row .res-icon { font-size: 16px; width: 22px; text-align: center; }
.res-row .res-name { flex: 1; color: var(--text-dim); font-size: 11px; }
.res-row .res-val { font-family: 'Lilita One', cursive; color: var(--gold); min-width: 35px; text-align: right; }

/* ═══ TOP-RIGHT: Timer & Level ═══ */
#top-right {
  position: absolute;
  top: 12px; right: 12px;
  display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
  z-index: 20;
}

.info-badge {
  background: var(--panel-bg);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 8px 14px;
  display: flex; align-items: center; gap: 8px;
  font-family: 'Lilita One', cursive;
}
.info-badge .badge-icon { font-size: 20px; }
.info-badge .badge-val { font-size: 18px; color: var(--gold); }

/* ═══ BOTTOM: XP Bar & Stats ═══ */
#bottom-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 50px;
  background: linear-gradient(0deg, rgba(0,0,0,0.8), rgba(0,0,0,0.4));
  display: flex; align-items: center;
  padding: 0 16px; gap: 16px;
  z-index: 20;
}

#xp-section { flex: 1; }
#xp-bar-outer {
  height: 16px;
  background: rgba(0,0,0,0.5);
  border-radius: 8px;
  border: 2px solid rgba(255,255,255,0.15);
  overflow: hidden;
  position: relative;
}
#xp-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #7c4dff, #e040fb);
  border-radius: 6px;
  transition: width 0.3s;
  width: 0%;
}
#xp-label {
  position: absolute; top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  font-size: 10px; font-weight: 700;
  text-shadow: 0 1px 3px rgba(0,0,0,0.8);
}

.bottom-stat {
  display: flex; align-items: center; gap: 4px;
  font-size: 12px;
  background: rgba(255,255,255,0.08);
  padding: 4px 10px; border-radius: 12px;
}
.bottom-stat .bs-icon { font-size: 14px; }
.bottom-stat .bs-val { font-family: 'Lilita One', cursive; color: var(--gold); }

/* ═══ RIGHT PANEL: Upgrades ═══ */
#upgrade-panel {
  position: absolute;
  top: 70px; right: 12px;
  background: var(--panel-bg);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 10px;
  z-index: 20;
  width: 200px;
  max-height: calc(100vh - 150px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.2) transparent;
}

#upgrade-panel .up-title {
  font-family: 'Lilita One', cursive;
  font-size: 13px; color: var(--gold);
  text-align: center;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.upgrade-item {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 8px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.upgrade-item:hover {
  background: rgba(255,255,255,0.08);
  border-color: var(--gold);
}
.upgrade-item.can-buy {
  border-color: var(--green);
  box-shadow: 0 0 8px rgba(76,175,80,0.2);
}
.upgrade-item.maxed { opacity: 0.5; cursor: default; }
.up-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.up-icon { font-size: 16px; }
.up-name { font-size: 11px; font-weight: 700; flex: 1; }
.up-lvl { font-size: 10px; color: var(--purple); background: rgba(187,134,252,0.15); padding: 1px 6px; border-radius: 8px; }
.up-desc { font-size: 9px; color: var(--text-dim); margin-bottom: 3px; }
.up-cost { font-size: 10px; color: #ff8c00; }

/* ═══ CANVAS AREA ═══ */
#game-canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}

/* ═══ FLOATING TEXT ═══ */
.float-text {
  position: absolute;
  pointer-events: none;
  z-index: 30;
  font-family: 'Lilita One', cursive;
  animation: floatUp 0.7s ease-out forwards;
  text-shadow: 0 2px 4px rgba(0,0,0,0.7);
}
@keyframes floatUp {
  0% { transform: translateY(0) scale(0.7); opacity: 1; }
  70% { opacity: 1; }
  100% { transform: translateY(-40px) scale(1); opacity: 0; }
}

/* ═══ LEVEL UP OVERLAY ═══ */
#levelup-overlay {
  position: fixed; top:0;left:0;right:0;bottom:0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(5px);
  display: none; align-items: center; justify-content: center;
  z-index: 100; flex-direction: column; gap: 16px;
}
#levelup-overlay.show { display: flex; }

#levelup-overlay h2 {
  font-family: 'Lilita One', cursive;
  font-size: 32px; color: var(--gold);
  text-shadow: 0 0 20px rgba(255,215,0,0.5);
}

.talent-cards { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }

.tcard {
  width: 140px;
  background: linear-gradient(135deg, #3a2a50, #2a1a40);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  padding: 18px 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
}
.tcard:hover {
  border-color: var(--gold);
  transform: translateY(-6px);
  box-shadow: 0 10px 30px rgba(255,215,0,0.2);
}
.tcard .tc-icon { font-size: 32px; margin-bottom: 6px; }
.tcard .tc-name { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
.tcard .tc-desc { font-size: 10px; color: var(--text-dim); }

/* ═══ PIN CURSOR ═══ */
#pin-cursor {
  position: absolute;
  z-index: 50;
  pointer-events: none;
  font-size: 32px;
  transform: translate(-50%, -100%);
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.6));
  display: none;
  transition: none;
}
</style>
</head>
<body>

<div id="game">
  <canvas id="game-canvas"></canvas>

  <!-- PIN CURSOR that user drags -->
  <div id="pin-cursor">📌</div>

  <!-- TOP LEFT: Resources -->
  <div id="res-panel">
    <div class="res-title">📦 Malzemeler</div>
    <div id="res-list"></div>
  </div>

  <!-- TOP RIGHT: Level & Score -->
  <div id="top-right">
    <div class="info-badge">
      <span class="badge-icon">⭐</span>
      <span class="badge-val" id="level-val">1</span>
    </div>
    <div class="info-badge">
      <span class="badge-icon">🎈</span>
      <span class="badge-val" id="pops-val">0</span>
    </div>
  </div>

  <!-- RIGHT: Upgrades -->
  <div id="upgrade-panel">
    <div class="up-title">🌳 Yükseltmeler</div>
    <div id="upgrade-list"></div>
  </div>

  <!-- BOTTOM: XP Bar -->
  <div id="bottom-bar">
    <div id="xp-section">
      <div id="xp-bar-outer">
        <div id="xp-bar-fill"></div>
        <div id="xp-label">Lv.1 — 0/20 XP</div>
      </div>
    </div>
    <div class="bottom-stat"><span class="bs-icon">💥</span><span class="bs-val" id="bs-dmg">1</span></div>
    <div class="bottom-stat"><span class="bs-icon">🎯</span><span class="bs-val" id="bs-crit">5%</span></div>
    <div class="bottom-stat"><span class="bs-icon">🤖</span><span class="bs-val" id="bs-auto">0</span></div>
  </div>

  <!-- LEVEL UP -->
  <div id="levelup-overlay">
    <h2>⭐ SEVİYE ATLADIN!</h2>
    <p style="color:var(--text-dim);font-size:13px;">Bir yetenek seç:</p>
    <div class="talent-cards" id="talent-cards"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════
const AC = window.AudioContext || window.webkitAudioContext;
let ac;
function initAudio() { if (!ac) ac = new AC(); }
function sfx(type) {
  if (!ac) return;
  const t = ac.currentTime;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  if (type === 'pop') {
    o.type='sine'; o.frequency.setValueAtTime(700+Math.random()*300,t);
    o.frequency.exponentialRampToValueAtTime(200,t+0.1);
    g.gain.setValueAtTime(0.18,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    o.start(t); o.stop(t+0.12);
  } else if (type === 'crit') {
    o.type='sawtooth'; o.frequency.setValueAtTime(1200,t);
    o.frequency.exponentialRampToValueAtTime(400,t+0.12);
    g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    o.start(t); o.stop(t+0.15);
  } else if (type === 'lvl') {
    [1,1.25,1.5,2].forEach((p,i) => {
      const o2=ac.createOscillator(),g2=ac.createGain();
      o2.connect(g2); g2.connect(ac.destination);
      o2.type='triangle'; o2.frequency.value=500*p;
      g2.gain.setValueAtTime(0.12,t+i*0.08);
      g2.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.2);
      o2.start(t+i*0.08); o2.stop(t+i*0.08+0.2);
    });
    o.disconnect(); g.disconnect();
  } else if (type === 'buy') {
    o.type='square'; o.frequency.setValueAtTime(400,t);
    o.frequency.exponentialRampToValueAtTime(700,t+0.06);
    g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    o.start(t); o.stop(t+0.1);
  } else { o.disconnect(); g.disconnect(); }
}

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const MATS = [
  { id:'rubber', name:'Lastik', icon:'🟤', color:'#8B4513' },
  { id:'latex', name:'Lateks', icon:'🟡', color:'#FFD700' },
  { id:'helium', name:'Helyum', icon:'🔵', color:'#40C4FF' },
  { id:'silk', name:'İpek', icon:'🟣', color:'#BB86FC' },
  { id:'crystal', name:'Kristal', icon:'💎', color:'#00E5FF' },
];

const BTYPES = [
  { name:'Kırmızı', c1:'#ff3366', c2:'#ff6b8a', hp:4, xp:1, r:0.55, drops:[{m:'rubber',ch:0.9,q:[1,2]}] },
  { name:'Mavi', c1:'#40c4ff', c2:'#80d8ff', hp:8, xp:2, r:0.5, drops:[{m:'rubber',ch:0.5,q:[1,1]},{m:'latex',ch:0.5,q:[1,1]}] },
  { name:'Yeşil', c1:'#4caf50', c2:'#81c784', hp:16, xp:3, r:0.45, drops:[{m:'latex',ch:0.6,q:[1,2]},{m:'helium',ch:0.3,q:[1,1]}] },
  { name:'Sarı', c1:'#ffd700', c2:'#fff176', hp:35, xp:5, r:0.4, drops:[{m:'latex',ch:0.4,q:[1,2]},{m:'helium',ch:0.5,q:[1,2]}] },
  { name:'Mor', c1:'#bb86fc', c2:'#d1a3ff', hp:80, xp:8, r:0.3, drops:[{m:'helium',ch:0.5,q:[1,2]},{m:'silk',ch:0.35,q:[1,1]}] },
  { name:'Pembe', c1:'#ff6ec7', c2:'#ff9ed7', hp:200, xp:12, r:0.2, drops:[{m:'silk',ch:0.5,q:[1,2]},{m:'crystal',ch:0.2,q:[1,1]}] },
  { name:'Siyah', c1:'#444', c2:'#777', hp:500, xp:20, r:0.12, drops:[{m:'crystal',ch:0.5,q:[2,3]},{m:'silk',ch:0.4,q:[1,2]}] },
];

const UPGRADES = [
  { id:'power', name:'Patlama Gücü', icon:'💥', desc:'+{v} hasar', max:50, base:1, per:1, costMat:'rubber', costBase:5, costMul:1.35 },
  { id:'crit', name:'Kritik Şansı', icon:'🎯', desc:'+{v}% kritik', max:20, base:2, per:2, costMat:'latex', costBase:8, costMul:1.5 },
  { id:'critdmg', name:'Kritik Hasar', icon:'⚔️', desc:'x{v} kritik çarpan', max:15, base:0.25, per:0.25, costMat:'helium', costBase:6, costMul:1.55 },
  { id:'auto', name:'Oto-Patlat', icon:'🤖', desc:'Saniyede {v} oto vuruş', max:30, base:0.5, per:0.5, costMat:'latex', costBase:12, costMul:1.4 },
  { id:'multi', name:'Çoklu Patlat', icon:'🔥', desc:'%{v} sıçrama', max:20, base:5, per:5, costMat:'helium', costBase:10, costMul:1.5 },
  { id:'luck', name:'Şans', icon:'🍀', desc:'+{v}% düşme şansı', max:25, base:3, per:3, costMat:'rubber', costBase:6, costMul:1.3 },
  { id:'xpup', name:'XP Artışı', icon:'📚', desc:'+{v}% XP', max:20, base:5, per:5, costMat:'silk', costBase:5, costMul:1.5 },
  { id:'area', name:'Pin Alanı', icon:'📡', desc:'Pin yarıçapı +{v}', max:10, base:3, per:3, costMat:'crystal', costBase:8, costMul:1.8 },
];

const TALENTS = [
  { name:'Güç Dalgası', icon:'💥', desc:'Hasar x1.5', fn:()=>{ S.tDmg*=1.5; } },
  { name:'Hız Artışı', icon:'💨', desc:'Oto-hız +50%', fn:()=>{ S.tAuto+=0.5; } },
  { name:'Altın Parmak', icon:'✨', desc:'Ekstra malzeme +1', fn:()=>{ S.tMat+=1; } },
  { name:'Şanslı Yıldız', icon:'🌟', desc:'Kritik +10%', fn:()=>{ S.tCrit+=10; } },
  { name:'XP Kaynağı', icon:'📖', desc:'XP x2', fn:()=>{ S.tXp*=2; } },
  { name:'Dev Alan', icon:'📡', desc:'Pin alanı +10', fn:()=>{ S.tArea+=10; } },
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const S = {
  pops: 0, level: 1, xp: 0, xpNeed: 20,
  mats: {}, ups: {},
  // talents
  tDmg: 1, tAuto: 0, tMat: 0, tCrit: 0, tXp: 1, tArea: 0,
  // derived
  dmg: 1, critCh: 5, critMul: 2, autoRate: 0, multiCh: 0, luck: 0, xpMul: 0, pinR: 18,
};
MATS.forEach(m => S.mats[m.id] = 0);
UPGRADES.forEach(u => S.ups[u.id] = 0);

// ═══════════════════════════════════════════
// GRID & BALLOONS
// ═══════════════════════════════════════════
const GRID_SIZE = 12;
const TILE_W = 52;
const TILE_H = 26;
let gridBalloons = []; // {gx, gy, type, hp, maxHp, alive, popAnim, shakeT}
let cam = { x: 0, y: 0 };

function initGrid() {
  gridBalloons = [];
  for (let gy = 0; gy < GRID_SIZE; gy++) {
    for (let gx = 0; gx < GRID_SIZE; gx++) {
      if (Math.random() < 0.75) {
        const type = pickBalloonType();
        const hpScale = 1 + (S.level - 1) * 0.2;
        const hp = Math.floor(type.hp * hpScale);
        gridBalloons.push({ gx, gy, type, hp, maxHp: hp, alive: true, popAnim: 0, shakeT: 0 });
      }
    }
  }
}

function pickBalloonType() {
  // weighted by rarity
  const total = BTYPES.reduce((a, b) => a + b.r, 0);
  let r = Math.random() * total;
  for (const bt of BTYPES) {
    r -= bt.r;
    if (r <= 0) return bt;
  }
  return BTYPES[0];
}

function isoToScreen(gx, gy) {
  const cx = canvas.width / 2 + cam.x;
  const cy = canvas.height * 0.38 + cam.y;
  const sx = cx + (gx - gy) * TILE_W / 2;
  const sy = cy + (gx + gy) * TILE_H / 2;
  return { x: sx, y: sy };
}

function screenToGrid(sx, sy) {
  const cx = canvas.width / 2 + cam.x;
  const cy = canvas.height * 0.38 + cam.y;
  const rx = sx - cx;
  const ry = sy - cy;
  const gx = (rx / (TILE_W / 2) + ry / (TILE_H / 2)) / 2;
  const gy = (ry / (TILE_H / 2) - rx / (TILE_W / 2)) / 2;
  return { gx: Math.round(gx), gy: Math.round(gy) };
}

// ═══════════════════════════════════════════
// PIN (draggable)
// ═══════════════════════════════════════════
let pinX = 0, pinY = 0, pinActive = false;
let pinEl = document.getElementById('pin-cursor');
let lastHitTime = 0;

function onPointerDown(e) {
  initAudio();
  pinActive = true;
  updatePin(e);
  pinEl.style.display = 'block';
}

function onPointerMove(e) {
  if (!pinActive) return;
  updatePin(e);
}

function onPointerUp(e) {
  pinActive = false;
}

function updatePin(e) {
  const rect = canvas.getBoundingClientRect();
  pinX = (e.clientX - rect.left) * (canvas.width / rect.width);
  pinY = (e.clientY - rect.top) * (canvas.height / rect.height);
  pinEl.style.left = e.clientX + 'px';
  pinEl.style.top = e.clientY + 'px';

  // Hit balloons near pin
  const now = performance.now();
  if (now - lastHitTime > 80) {
    lastHitTime = now;
    hitNearPin();
  }
}

function hitNearPin() {
  const hitR = S.pinR;
  gridBalloons.forEach(b => {
    if (!b.alive) return;
    const p = isoToScreen(b.gx, b.gy);
    const dx = pinX - p.x;
    const dy = pinY - (p.y - 12);
    if (Math.sqrt(dx * dx + dy * dy) < hitR + 18) {
      hitBalloon(b);
    }
  });
}

function hitBalloon(b) {
  if (!b.alive) return;
  let dmg = S.dmg;
  let isCrit = Math.random() * 100 < S.critCh;
  if (isCrit) dmg = Math.floor(dmg * S.critMul);
  dmg = Math.max(1, Math.floor(dmg * S.tDmg));

  b.hp -= dmg;
  b.shakeT = 6;

  sfx(isCrit ? 'crit' : 'pop');
  showFloatText(b, dmg, isCrit);

  if (b.hp <= 0) {
    destroyBalloon(b);
  }
}

function destroyBalloon(b) {
  b.alive = false;
  b.popAnim = 10;
  S.pops++;

  // XP
  let xpGain = Math.ceil(b.type.xp * (1 + S.xpMul / 100) * S.tXp);
  S.xp += xpGain;

  // Drops
  b.type.drops.forEach(d => {
    const ch = d.ch + S.luck / 100;
    if (Math.random() < ch) {
      const qty = rand(d.q[0], d.q[1]) + S.tMat;
      S.mats[d.m] = (S.mats[d.m] || 0) + qty;
      showMatFloat(b, d.m, qty);
    }
  });

  // Multi pop
  if (Math.random() * 100 < S.multiCh) {
    const neighbors = gridBalloons.filter(ob => ob.alive && Math.abs(ob.gx - b.gx) <= 1 && Math.abs(ob.gy - b.gy) <= 1 && ob !== b);
    if (neighbors.length > 0) {
      const t = neighbors[Math.floor(Math.random() * neighbors.length)];
      setTimeout(() => hitBalloon(t), 50);
    }
  }

  checkLevelUp();

  // Respawn after delay
  setTimeout(() => {
    if (gridBalloons.filter(bb => bb.alive).length < GRID_SIZE * GRID_SIZE * 0.6) {
      const type = pickBalloonType();
      const hpS = 1 + (S.level - 1) * 0.2;
      const hp = Math.floor(type.hp * hpS);
      b.type = type; b.hp = hp; b.maxHp = hp; b.alive = true; b.popAnim = 0;
    }
  }, 1500 + Math.random() * 2000);

  renderUI();
}

function showFloatText(b, dmg, isCrit) {
  const p = isoToScreen(b.gx, b.gy);
  const rect = canvas.getBoundingClientRect();
  const sx = rect.left + p.x * (rect.width / canvas.width);
  const sy = rect.top + (p.y - 20) * (rect.height / canvas.height);
  const el = document.createElement('div');
  el.className = 'float-text';
  el.style.left = sx + 'px';
  el.style.top = sy + 'px';
  el.style.color = isCrit ? '#ffd700' : '#fff';
  el.style.fontSize = isCrit ? '22px' : '16px';
  el.textContent = (isCrit ? '💥' : '') + formatNum(dmg);
  document.getElementById('game').appendChild(el);
  setTimeout(() => el.remove(), 700);
}

function showMatFloat(b, matId, qty) {
  const mat = MATS.find(m => m.id === matId);
  const p = isoToScreen(b.gx, b.gy);
  const rect = canvas.getBoundingClientRect();
  const sx = rect.left + (p.x + 15) * (rect.width / canvas.width);
  const sy = rect.top + (p.y - 10) * (rect.height / canvas.height);
  const el = document.createElement('div');
  el.className = 'float-text';
  el.style.left = sx + 'px';
  el.style.top = sy + 'px';
  el.style.color = mat.color;
  el.style.fontSize = '14px';
  el.textContent = `${mat.icon}+${qty}`;
  document.getElementById('game').appendChild(el);
  setTimeout(() => el.remove(), 600);
}

// ═══════════════════════════════════════════
// LEVEL UP
// ═══════════════════════════════════════════
function checkLevelUp() {
  while (S.xp >= S.xpNeed) {
    S.xp -= S.xpNeed;
    S.level++;
    S.xpNeed = Math.floor(20 * Math.pow(1.35, S.level - 1));
    sfx('lvl');
    showTalentPick();
  }
}

function showTalentPick() {
  const ov = document.getElementById('levelup-overlay');
  const cont = document.getElementById('talent-cards');
  cont.innerHTML = '';
  const shuffled = [...TALENTS].sort(() => Math.random() - 0.5).slice(0, 3);
  shuffled.forEach(t => {
    const c = document.createElement('div');
    c.className = 'tcard';
    c.innerHTML = `<div class="tc-icon">${t.icon}</div><div class="tc-name">${t.name}</div><div class="tc-desc">${t.desc}</div>`;
    c.onclick = () => { t.fn(); ov.classList.remove('show'); recalc(); renderUI(); };
    cont.appendChild(c);
  });
  ov.classList.add('show');
}

// ═══════════════════════════════════════════
// UPGRADES
// ═══════════════════════════════════════════
function buyUpgrade(id) {
  const u = UPGRADES.find(x => x.id === id);
  const lvl = S.ups[id];
  if (lvl >= u.max) return;
  const cost = Math.floor(u.costBase * Math.pow(u.costMul, lvl));
  if ((S.mats[u.costMat] || 0) < cost) return;
  S.mats[u.costMat] -= cost;
  S.ups[id]++;
  sfx('buy');
  recalc();
  renderUI();
}

// ═══════════════════════════════════════════
// AUTO POPPER
// ═══════════════════════════════════════════
let autoTimer = 0;
function tickAuto(dt) {
  if (S.autoRate <= 0) return;
  autoTimer += dt;
  const interval = 1 / S.autoRate;
  while (autoTimer >= interval) {
    autoTimer -= interval;
    // Pick random alive balloon
    const alive = gridBalloons.filter(b => b.alive);
    if (alive.length > 0) {
      hitBalloon(alive[Math.floor(Math.random() * alive.length)]);
    }
  }
}

// ═══════════════════════════════════════════
// RECALC STATS
// ═══════════════════════════════════════════
function recalc() {
  S.dmg = 1 + S.ups.power * 1;
  S.critCh = 5 + S.ups.crit * 2 + S.tCrit;
  S.critMul = 2 + S.ups.critdmg * 0.25;
  S.autoRate = (S.ups.auto * 0.5) * (1 + S.tAuto);
  S.multiCh = S.ups.multi * 5;
  S.luck = S.ups.luck * 3;
  S.xpMul = S.ups.xpup * 5;
  S.pinR = 18 + S.ups.area * 3 + S.tArea;

  document.getElementById('bs-dmg').textContent = formatNum(Math.floor(S.dmg * S.tDmg));
  document.getElementById('bs-crit').textContent = Math.min(100, S.critCh).toFixed(0) + '%';
  document.getElementById('bs-auto').textContent = S.autoRate.toFixed(1);
}

// ═══════════════════════════════════════════
// RENDER UI
// ═══════════════════════════════════════════
function renderUI() {
  document.getElementById('level-val').textContent = S.level;
  document.getElementById('pops-val').textContent = formatNum(S.pops);

  const pct = Math.min(100, S.xp / S.xpNeed * 100);
  document.getElementById('xp-bar-fill').style.width = pct + '%';
  document.getElementById('xp-label').textContent = `Lv.${S.level} — ${formatNum(S.xp)}/${formatNum(S.xpNeed)} XP`;

  // Resources
  const rl = document.getElementById('res-list');
  rl.innerHTML = '';
  MATS.forEach(m => {
    const r = document.createElement('div');
    r.className = 'res-row';
    r.innerHTML = `<span class="res-icon">${m.icon}</span><span class="res-name">${m.name}</span><span class="res-val">${formatNum(S.mats[m.id])}</span>`;
    rl.appendChild(r);
  });

  // Upgrades
  const ul = document.getElementById('upgrade-list');
  ul.innerHTML = '';
  UPGRADES.forEach(u => {
    const lvl = S.ups[u.id];
    const cost = Math.floor(u.costBase * Math.pow(u.costMul, lvl));
    const mat = MATS.find(m => m.id === u.costMat);
    const canBuy = lvl < u.max && (S.mats[u.costMat] || 0) >= cost;
    const maxed = lvl >= u.max;
    const val = u.base + u.per * lvl;
    const desc = u.desc.replace('{v}', Number.isInteger(val) ? val : val.toFixed(2));

    const el = document.createElement('div');
    el.className = 'upgrade-item' + (canBuy ? ' can-buy' : '') + (maxed ? ' maxed' : '');
    el.innerHTML = `
      <div class="up-header"><span class="up-icon">${u.icon}</span><span class="up-name">${u.name}</span><span class="up-lvl">${lvl}/${u.max}</span></div>
      <div class="up-desc">${desc}</div>
      ${!maxed ? `<div class="up-cost">${mat.icon} ${formatNum(cost)}</div>` : '<div style="color:var(--gold);font-size:9px;">MAX</div>'}
    `;
    if (!maxed) el.onclick = () => buyUpgrade(u.id);
    ul.appendChild(el);
  });
}

// ═══════════════════════════════════════════
// CANVAS RENDERING
// ═══════════════════════════════════════════
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function drawFrame(dt) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw isometric grid
  drawGrid();

  // Draw balloons (sorted by gy+gx for depth)
  const sorted = [...gridBalloons].sort((a, b) => (a.gy + a.gx) - (b.gy + b.gx));
  sorted.forEach(b => {
    if (b.popAnim > 0) {
      b.popAnim = Math.max(0, b.popAnim - dt * 30);
      drawPopEffect(b);
    }
    if (b.alive) {
      if (b.shakeT > 0) b.shakeT -= dt * 30;
      drawBalloon(b);
    }
  });

  // Draw pin radius indicator when active
  if (pinActive) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,215,0,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(pinX, pinY - 16, S.pinR + 18, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

function drawGrid() {
  ctx.save();
  // Draw grass tiles
  for (let gy = 0; gy < GRID_SIZE; gy++) {
    for (let gx = 0; gx < GRID_SIZE; gx++) {
      const p = isoToScreen(gx, gy);
      drawTile(p.x, p.y);
    }
  }
  ctx.restore();
}

function drawTile(x, y) {
  const hw = TILE_W / 2;
  const hh = TILE_H / 2;
  ctx.beginPath();
  ctx.moveTo(x, y - hh);
  ctx.lineTo(x + hw, y);
  ctx.lineTo(x, y + hh);
  ctx.lineTo(x - hw, y);
  ctx.closePath();

  // Grass gradient
  const grad = ctx.createLinearGradient(x - hw, y - hh, x + hw, y + hh);
  grad.addColorStop(0, '#3a8a30');
  grad.addColorStop(0.5, '#4caf50');
  grad.addColorStop(1, '#2e7d32');
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawBalloon(b) {
  const p = isoToScreen(b.gx, b.gy);
  let sx = p.x, sy = p.y - 16;
  const size = 18;

  // Shake
  if (b.shakeT > 0) {
    sx += (Math.random() - 0.5) * 4;
    sy += (Math.random() - 0.5) * 4;
  }

  // Floating bob
  const bob = Math.sin(performance.now() * 0.002 + b.gx * 0.7 + b.gy * 1.1) * 3;
  sy += bob;

  ctx.save();

  // Shadow
  ctx.beginPath();
  ctx.ellipse(p.x, p.y + 2, 10, 5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fill();

  // String
  ctx.beginPath();
  ctx.moveTo(sx, sy + size);
  ctx.quadraticCurveTo(sx + 2, sy + size + 6, p.x, p.y + 2);
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Balloon body
  const grad = ctx.createRadialGradient(sx - 4, sy - 5, 2, sx, sy, size);
  grad.addColorStop(0, b.type.c2);
  grad.addColorStop(1, b.type.c1);
  ctx.beginPath();
  ctx.ellipse(sx, sy, size * 0.85, size, 0, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Highlight
  ctx.beginPath();
  ctx.ellipse(sx - 5, sy - 6, 5, 3.5, -0.4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();

  // Knot
  ctx.beginPath();
  ctx.moveTo(sx - 3, sy + size);
  ctx.lineTo(sx, sy + size + 4);
  ctx.lineTo(sx + 3, sy + size);
  ctx.fillStyle = b.type.c1;
  ctx.fill();

  // HP bar
  if (b.hp < b.maxHp) {
    const bw = 24;
    const bh = 4;
    const bx = sx - bw / 2;
    const by = sy - size - 8;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(bx, by, bw, bh);
    const pct = b.hp / b.maxHp;
    ctx.fillStyle = pct > 0.5 ? '#4caf50' : pct > 0.25 ? '#ff9800' : '#f44336';
    ctx.fillRect(bx, by, bw * pct, bh);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(bx, by, bw, bh);
  }

  ctx.restore();
}

function drawPopEffect(b) {
  if (b.popAnim <= 0) return;
  const p = isoToScreen(b.gx, b.gy);
  const t = Math.max(0, b.popAnim / 10);
  const alpha = Math.max(0, Math.min(1, t));
  const radius = Math.max(0.1, 20 * (1.5 - t));

  ctx.save();
  ctx.globalAlpha = alpha;

  // Burst circle
  ctx.beginPath();
  ctx.arc(p.x, p.y - 16, radius, 0, Math.PI * 2);
  ctx.strokeStyle = b.type.c1;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Shards
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI * 2 / 6) * i;
    const dist = Math.max(0, radius * 1.2);
    const sx = p.x + Math.cos(angle) * dist;
    const sy = p.y - 16 + Math.sin(angle) * dist;
    const sr = Math.max(0.1, 3 * t);
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fillStyle = b.type.c2;
    ctx.fill();
  }

  ctx.restore();
}

// ═══════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════
let lastTime = 0;
function loop(now) {
  const dt = Math.min(0.1, (now - lastTime) / 1000);
  lastTime = now;

  tickAuto(dt);
  drawFrame(dt);

  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
canvas.addEventListener('pointerdown', onPointerDown);
window.addEventListener('pointermove', onPointerMove);
window.addEventListener('pointerup', onPointerUp);
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });

initGrid();
recalc();
renderUI();
requestAnimationFrame(loop);

// ═══════════════════════════════════════════
// UTIL
// ═══════════════════════════════════════════
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function formatNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toString();
}
</script>
